syntax = "proto3";

package bootstrap.v1;

import "bootstrap/v1/app.proto";
import "bootstrap/v1/server.proto";
import "bootstrap/v1/config.proto";
import "bootstrap/v1/registry.proto";
import "bootstrap/v1/log.proto";
import "bootstrap/v1/tracer.proto";
import "bootstrap/v1/metrics.proto";
import "bootstrap/v1/broker.proto";
import "bootstrap/v1/storage.proto";
import "bootstrap/v1/ai.proto";
import "bootstrap/v1/workflow.proto";
import "bootstrap/v1/cache.proto";
import "bootstrap/v1/script.proto";
import "bootstrap/v1/database.proto";

option go_package = "github.com/kalandramo/lulu-bootstrap/conf/gen/go/bootstrap/v1";

// BootstrapConfig 是 lulu-bootstrap 的顶层配置，
// 声明式描述一个应用的完整拓扑：传输层、配置中心、注册中心、日志、追踪、指标、消息代理。
// bootstrap 引擎将此配置解析为 lulu.Option 链，最终创建并运行 lulu.App。
message BootstrapConfig {
  // 应用元数据。
  App app = 1;

  // 传输层，支持通过 optional 字段同时配置多种传输协议。
  Server server = 2;

  // 配置中心，支持通过 optional 字段同时配置多种配置源（混合配置）。
  Config config = 3;

  // 服务注册发现。
  Registry registry = 4;

  // 日志系统。
  Logger logger = 5;

  // 分布式追踪。
  Tracer tracer = 6;

  // 指标监控。
  Metrics metrics = 7;

  // 消息代理，支持通过 optional 字段同时配置多种消息中间件。
  Broker broker = 8;

  // 对象存储，支持 MinIO / S3。
  Storage storage = 9;

  // AI 模型客户端，支持 OpenAI / LangChainGo / Eino。
  Ai ai = 10;

  // 工作流引擎，支持 Temporal / Argo / Conductor / GoWorkflows。
  Workflow workflow = 11;

  // 缓存，支持 Local（内存）/ Redis。
  Cache cache = 12;

  // 脚本引擎，支持 Lua / JavaScript / Python / CEL / Expr 等。
  Script script = 13;

  // 数据库，支持 GORM / MongoDB / ClickHouse / Doris / ES / OpenSearch / InfluxDB / Cassandra。
  Database database = 14;
}
